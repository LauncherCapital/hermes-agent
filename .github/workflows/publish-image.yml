name: Publish container image (GHCR)

# Build the recipe image ONCE per push so per-tenant provisioning deploys a
# prebuilt image (pull+boot, ~2-3min) instead of rebuilding from source (~7-8min).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Immutable tag only — the provisioner pins a specific SHA
          # (HERMES_RECIPE_IMAGE). We deliberately do NOT move a floating :latest,
          # so a new build never silently changes running provisioning; upgrading
          # = build a SHA → e2e → re-pin.
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
